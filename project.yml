name: VoiceInputApp
options:
  bundleIdPrefix: com.example.voiceinput
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    APP_GROUP_IDENTIFIER: group.com.example.voiceinput

packages:
  SharedKit:
    path: SharedKit

targets:
  VoiceInputApp:
    type: application
    platform: iOS
    sources:
      - path: VoiceInputApp
    resources:
      - path: VoiceInputApp/Resources
    dependencies:
      - target: KeyboardExtension
        embed: true
      - package: SharedKit
    info:
      path: VoiceInputApp/Info.plist
      properties:
        CFBundleDisplayName: 语音输入
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSMicrophoneUsageDescription: 用于录制语音并转写为文本
        NSSpeechRecognitionUsageDescription: 用于本地语音活动检测
        CFBundleURLTypes:
          - CFBundleURLName: com.example.voiceinput
            CFBundleURLSchemes:
              - voiceinput
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.voiceinput
        CODE_SIGN_ENTITLEMENTS: VoiceInputApp/VoiceInputApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"

  KeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: KeyboardExtension
    dependencies:
      - package: SharedKit
    info:
      path: KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: 语音输入
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: zh-Hans
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.voiceinput.keyboard
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/KeyboardExtension.entitlements

  VoiceInputAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceInputAppTests
    dependencies:
      - target: VoiceInputApp
      - package: SharedKit
